name: Deploy

on:
  release:
    types: [created]
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: "./global.json"

      - name: Restore dependencies
        run: dotnet restore

      - name: Set Version
        run: |
          echo "${{ github.ref }}"
          $tagVersion = "${{ github.ref }}".substring(11)
          echo "buildVersion=$tagVersion.${{ github.run_number }}" >> $env:GITHUB_ENV
          echo "nugetVersion=$tagVersion" >> $env:GITHUB_ENV
          echo "preRelease=false" >> $env:GITHUB_ENV

      - name: Pack
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          dotnet pack -p:PackageVersion=${{ env.nugetVersion }} --configuration Release -o ${{ github.workspace }}/PackedNuget
          # NU5017 is a known false positive for RID-specific tool pointer packages (SDK 10 bug):
          # NuGet validation does not yet recognise DotnetToolSettings.xml as package content.
          # All packages are created correctly. Verify they exist before proceeding.
          $pkgs = Get-ChildItem "${{ github.workspace }}/PackedNuget" -Filter "*.nupkg"
          if ($pkgs.Count -lt 4) { throw "Expected at least 4 .nupkg files but found $($pkgs.Count)" }
          $LASTEXITCODE = 0

      - name: Upload Artifacts
        if: startsWith(github.ref, 'refs/tags/v')
        uses: actions/upload-artifact@v7
        with:
          name: NuGet
          path: ${{ github.workspace }}/PackedNuget

  deploy:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build-and-test
    environment:
      name: "Production"
      url: "https://www.nuget.org/packages/CHANGEME_Package_Name"
    name: Push NuGets

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      # RID-specific packages MUST be published before the top-level pointer package.
      # If the pointer package is published first, installs will fail until all sub-packages exist.
      # See: https://learn.microsoft.com/en-us/dotnet/core/tools/rid-specific-tools#publish-your-tool
      - name: Push RID-specific NuGet packages
        run: |
          $version = "${{ github.ref }}".substring(11)
          foreach ($rid in @("win-x64", "linux-x64", "osx-arm64")) {
            $pkg = "CHANGEME_Package_Name.$rid.$version.nupkg"
            if (Test-Path $pkg) {
              dotnet nuget push $pkg --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
            }
          }

      - name: Push top-level pointer package
        run: |
          $version = "${{ github.ref }}".substring(11)
          dotnet nuget push "CHANGEME_Package_Name.$version.nupkg" --source https://api.nuget.org/v3/index.json --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
