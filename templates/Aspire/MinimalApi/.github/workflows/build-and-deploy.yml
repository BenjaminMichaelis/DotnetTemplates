name: Build and Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - 'Infra/**'
      - '.github/workflows/deploy-infrastructure.yml'
  pull_request:
    branches: [main]
    paths-ignore:
      - 'Infra/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

defaults:
  run:
    shell: pwsh

env:
  DOTNET_VERSION: '10.0.x'
  TERRAFORM_VERSION: '1.14.6'

jobs:
  # Build and test backend
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          global-json-file: global.json

      - name: Restore .NET dependencies
        run: dotnet restore

      - name: Enforce formatting
        run: |
          .\.github\scripts\Invoke-DotNetFormatStrict.ps1 -DiscoverFromCurrentDirectory
 
      - name: Build
        run: dotnet build --no-restore --configuration Release

      - name: Restore .NET Tools
        run: dotnet tool restore

      - name: Check for Pending Database Changes
        run: |
          dotnet tool run dotnet-ef migrations has-pending-model-changes `
            --configuration Release `
            --project MinimalApi.Data/MinimalApi.Data.csproj `
            --startup-project MinimalApi.AppHost/MinimalApi.AppHost.csproj `
            --no-build

      # Microsoft Testing Platform can stop the run once 10 tests fail in CI:
      # https://learn.microsoft.com/dotnet/core/testing/microsoft-testing-platform-cli-options
      # To enable retries, add Microsoft.Testing.Extensions.Retry to the test project, then pass
      # --retry-failed-tests plus --retry-failed-tests-max-percentage <value> to skip reruns when too many tests fail:
      # https://learn.microsoft.com/dotnet/core/testing/microsoft-testing-platform-retry#retry-1
      - name: Enable Automated Test Report Artifact Upload
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env['ACTIONS_RUNTIME_TOKEN']);
            core.exportVariable('ACTIONS_RESULTS_URL', process.env['ACTIONS_RESULTS_URL']);

      - name: Test
        run: dotnet test --no-build --configuration Release --verbosity normal --maximum-failed-tests 10 --results-directory trx-data --report-trx --report-trx-filename tests.trx

      - name: Generate merged failure playlist from TRX
        if: always()
        run: |
          $trxFiles = Get-ChildItem -Path "trx-data" -Recurse -File -Filter "*.trx" -ErrorAction SilentlyContinue |
            Select-Object -ExpandProperty FullName

          if (-not $trxFiles) {
            Write-Host "No TRX files found. Skipping playlist generation."
            exit 0
          }

          New-Item -ItemType Directory -Path "test-results" -Force | Out-Null

          $args = @("tool", "run", "trx-to-vsplaylist", "convert")
          $args += $trxFiles
          $args += @("--outcome", "Failed", "--output", "test-results/failed-tests.playlist", "--skip-empty")
          dotnet @args

      - name: Upload failed test playlist
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: failed-tests-playlist
          path: test-results/failed-tests.playlist
          if-no-files-found: ignore

      - name: Upload test failure logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: test-failure-logs
          path: '**/TestResults/logs/*.log'
          if-no-files-found: ignore
          retention-days: 7

      - name: Publish
        run: dotnet publish --configuration Release --no-build

      - name: Build Database Bundle
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        run: |
          dotnet ef migrations bundle `
            --self-contained `
            --no-build `
            --configuration Release `
            --project MinimalApi.Data/MinimalApi.Data.csproj `
            --startup-project .\MinimalApi.AppHost\MinimalApi.AppHost.csproj `
            --output efbundle

      - name: Upload DB Migration
        if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v7
        with:
          name: DatabaseMigration
          path: 'efbundle'
          retention-days: 1

  automerge:
    if: ${{ github.event_name == 'pull_request' && github.actor == 'dependabot[bot]' }}
    needs: [build]
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      contents: write

    steps:
      - name: Enable auto-merge for Dependabot PRs
        run: gh pr merge --auto --squash "${{ github.event.pull_request.number }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}

  # Get infrastructure outputs from Terraform state
  get-infrastructure-outputs:
    runs-on: ubuntu-latest
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: production
    outputs:
      acr_login_server: ${{ steps.terraform-outputs.outputs.acr_login_server }}
      backend_container_app_name: ${{ steps.terraform-outputs.outputs.backend_container_app_name }}
      backend_url: ${{ steps.terraform-outputs.outputs.backend_url }}
      resource_group_name: ${{ steps.terraform-outputs.outputs.resource_group_name }}
      database_connection_string: ${{ steps.terraform-outputs.outputs.database_connection_string }}
      applicationinsights_connection_string: ${{ steps.terraform-outputs.outputs.applicationinsights_connection_string }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}
          terraform_wrapper: false

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Terraform Init
        working-directory: Infra
        run: terraform init
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

      - name: Get Terraform Outputs
        id: terraform-outputs
        working-directory: Infra
        shell: bash
        run: |
          echo "acr_login_server=$(terraform output -raw acr_login_server)" >> $GITHUB_OUTPUT
          echo "backend_container_app_name=$(terraform output -raw backend_container_app_name)" >> $GITHUB_OUTPUT
          echo "resource_group_name=$(terraform output -raw resource_group_name)" >> $GITHUB_OUTPUT
          echo "backend_url=$(terraform output -raw backend_url)" >> $GITHUB_OUTPUT
          echo "database_connection_string=$(terraform output -raw database_connection_string)" >> $GITHUB_OUTPUT
          echo "applicationinsights_connection_string=$(terraform output -raw applicationinsights_connection_string)" >> $GITHUB_OUTPUT
        env:
          ARM_CLIENT_ID: ${{ secrets.ARM_CLIENT_ID }}
          ARM_SUBSCRIPTION_ID: ${{ secrets.ARM_SUBSCRIPTION_ID }}
          ARM_TENANT_ID: ${{ secrets.ARM_TENANT_ID }}
          ARM_USE_OIDC: true

  deploy-database:
    runs-on: ubuntu-latest
    needs: [build, get-infrastructure-outputs]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Download DB Migration Bundle
        uses: actions/download-artifact@v8
        with:
          name: DatabaseMigration

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Apply Migration
        run: |
          chmod +x efbundle
          $env:ConnectionStrings__Database = '${{ needs.get-infrastructure-outputs.outputs.database_connection_string }}'
          ./efbundle
          $exitCode = $LASTEXITCODE
          rm efbundle
          exit $exitCode


  # Build and push Docker image for backend
  deploy-backend:
    runs-on: ubuntu-latest
    needs: [build, get-infrastructure-outputs]
    if: (github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main'
    environment: production
    permissions:
      id-token: write
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        id: setup-buildx

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ secrets.ARM_CLIENT_ID }}
          tenant-id: ${{ secrets.ARM_TENANT_ID }}
          subscription-id: ${{ secrets.ARM_SUBSCRIPTION_ID }}

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name ${{ needs.get-infrastructure-outputs.outputs.acr_login_server }}

      - name: Restore BuildKit cache mounts
        uses: actions/cache@v5
        id: buildkit-cache
        with:
          path: .buildkit-cache
          key: minimalapi-buildkit-${{ hashFiles('MinimalApi/Dockerfile', 'Directory.Packages.props', 'Directory.Build.props', 'Directory.Build.targets', 'NuGet.config', 'MinimalApi/**/*.csproj') }}
          restore-keys: |
            minimalapi-buildkit-

      - name: Inject BuildKit cache mounts
        uses: reproducible-containers/buildkit-cache-dance@v3
        with:
          builder: ${{ steps.setup-buildx.outputs.name }}
          dockerfile: MinimalApi/Dockerfile
          cache-dir: .buildkit-cache
          skip-extraction: ${{ steps.buildkit-cache.outputs.cache-hit == 'true' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./MinimalApi/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ${{ needs.get-infrastructure-outputs.outputs.acr_login_server }}/minimalapi:${{ github.sha }}
          cache-from: type=gha,scope=minimalapi-main
          cache-to: type=gha,mode=max,scope=minimalapi-main

      - name: Update Container App
        run: |
          az containerapp update `
            --name ${{ needs.get-infrastructure-outputs.outputs.backend_container_app_name }} `
            --resource-group ${{ needs.get-infrastructure-outputs.outputs.resource_group_name }} `
            --image ${{ needs.get-infrastructure-outputs.outputs.acr_login_server }}/minimalapi:${{ github.sha }}
