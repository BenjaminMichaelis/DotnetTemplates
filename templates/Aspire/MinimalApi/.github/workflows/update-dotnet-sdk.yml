name: Update .NET SDK

# Dependabot does not support global.json natively, so this workflow fills that gap.
# It updates global.json when a newer SDK is available in the current major.minor channel.
#
# Docker FROM image tags are handled by Dependabot (dotnet-version multi-ecosystem group)
# which batches them with NuGet package updates into a single PR.
#
# A build-time alignment check (see build-and-deploy.yml) ensures global.json and the
# Dockerfile are on the same major.minor before any PR can merge.

on:
  schedule:
    - cron: '0 6 * * 1' # 06:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-dotnet-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read current version from global.json
        id: current
        run: |
          VERSION=$(jq -r '.sdk.version' global.json)
          MAJOR_MINOR=$(echo "$VERSION" | cut -d. -f1,2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "major_minor=$MAJOR_MINOR" >> "$GITHUB_OUTPUT"

      - name: Fetch latest SDK for current major.minor channel
        id: latest
        run: |
          MAJOR_MINOR="${{ steps.current.outputs.major_minor }}"
          VERSION=$(curl -fsSL \
            "https://dotnetcli.blob.core.windows.net/dotnet/release-metadata/${MAJOR_MINOR}/releases.json" \
            | jq -r '.releases[0].sdk.version')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Update global.json
        if: steps.latest.outputs.version != steps.current.outputs.version
        run: |
          jq --arg v "${{ steps.latest.outputs.version }}" \
            '.sdk.version = $v' global.json > tmp.json && mv tmp.json global.json

      - name: Open pull request
        if: steps.latest.outputs.version != steps.current.outputs.version
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore(deps): bump .NET SDK to ${{ steps.latest.outputs.version }}"
          branch: "deps/dotnet-sdk-${{ steps.latest.outputs.version }}"
          title: "chore(deps): bump .NET SDK to ${{ steps.latest.outputs.version }}"
          body: |
            Bumps `global.json` SDK version to `${{ steps.latest.outputs.version }}`.

            > [!NOTE]
            > Merge alongside the Dependabot `dotnet-version` PR (if open) that
            > updates the `mcr.microsoft.com/dotnet/aspnet` Docker image and NuGet packages.
            > The build CI will fail if `global.json` and the Dockerfile are on different
            > major.minor versions.
          labels: dependencies
