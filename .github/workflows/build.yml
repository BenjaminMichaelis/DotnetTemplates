name: Build

on:
  push:
    branches: [ main ]
    # Sequence of patterns matched against refs/tags
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

defaults:
  run:
    shell: pwsh

env:
  DOTNET_VERSION: 10.x

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: fastify/github-action-merge-dependabot@v3.12.0
        with:
            use-github-auto-merge: true

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build
      run: dotnet pack --configuration Release -o . 
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: NuGet
        path: ${{ github.workspace }}/*.nupkg

  test-library:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: tunit
            args: ""
          - variant: xunit
            args: "--tests xunit"

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          mkdir TestLibrary-${{ matrix.variant }}
          Push-Location TestLibrary-${{ matrix.variant }}
          dotnet new bmichaelis.nuget ${{ matrix.args }}
          dotnet test /p:TreatWarningsAsErrors=true
          dotnet pack --configuration Release -o ./NuGet

  test-quickstart-benchmarkconsole:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: tunit
            args: ""
          - variant: xunit
            args: "--tests xunit"

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          mkdir TestQuickstartBenchmarkConsole-${{ matrix.variant }}
          Push-Location TestQuickstartBenchmarkConsole-${{ matrix.variant }}
          dotnet new bmichaelis.quickstart.benchmarkconsole ${{ matrix.args }}
          dotnet test /p:TreatWarningsAsErrors=true
          cd TestQuickstartBenchmarkConsole
          dotnet run -c Release
          cd ..
          dotnet pack --configuration Release -o ./NuGet

  test-quickstart-consoleapp:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: tunit
            args: ""
          - variant: xunit
            args: "--tests xunit"

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          mkdir TestQuickstartConsoleApp-${{ matrix.variant }}
          Push-Location TestQuickstartConsoleApp-${{ matrix.variant }}
          dotnet new bmichaelis.quickstart.consoleapp ${{ matrix.args }}
          dotnet test /p:TreatWarningsAsErrors=true
          dotnet pack --configuration Release -o ./NuGet

  test-aspire-minimalapi:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false   # run all variants even if one fails — want the full picture
      matrix:
        include:
          - variant: default
            args: ""
          - variant: applicationInsights
            args: "--applicationInsights true"

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          $outDir = "TestAspireMinimalApi-${{ matrix.variant }}"
          mkdir $outDir
          Push-Location $outDir
          dotnet new bmichaelis.aspire.minimalapi --name MinimalApi ${{ matrix.args }}
          Push-Location MinimalApi
          dotnet build /p:TreatWarningsAsErrors=true
          dotnet test --no-build /p:TreatWarningsAsErrors=true
