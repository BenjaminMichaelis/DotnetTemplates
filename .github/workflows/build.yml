name: Build

on:
  push:
    branches: [ main ]
    # Sequence of patterns matched against refs/tags
    paths-ignore:
      - 'README.md'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: pwsh

env:
  DOTNET_VERSION: 10.x

jobs:
  automerge:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'pull_request' }}

    permissions:
      pull-requests: write
      contents: write

    steps:
      - uses: fastify/github-action-merge-dependabot@v3.12.0
        with:
            use-github-auto-merge: true

  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v6

    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}

    - name: Build
      run: dotnet pack --configuration Release -o . 
    
    - name: Upload Artifacts
      uses: actions/upload-artifact@v7
      with:
        name: NuGet
        path: ${{ github.workspace }}/*.nupkg

  test-library:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            args: ""
            expectSln: false
            expectSlnx: true
            expectTests: true
          - variant: no-tests
            args: "--no-tests"
            expectSln: false
            expectSlnx: true
            expectTests: false
          - variant: sln
            args: "--sln"
            expectSln: true
            expectSlnx: false
            expectTests: true
          - variant: no-sln
            args: "--no-sln"
            expectSln: false
            expectSlnx: false
            expectTests: true

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          $outDir = "TestLibrary-${{ matrix.variant }}"
          mkdir $outDir
          Push-Location $outDir
          dotnet new bmichaelis.nuget ${{ matrix.args }}
          $projectName = Split-Path -Leaf (Get-Location)
          $hasSln = Test-Path "$projectName.sln"
          $hasSlnx = Test-Path "$projectName.slnx"
          $hasTests = Test-Path "$projectName.Tests/$projectName.Tests.csproj"
          if ([bool]::Parse("${{ matrix.expectSln }}") -ne $hasSln) { throw "Unexpected .sln file presence: $hasSln" }
          if ([bool]::Parse("${{ matrix.expectSlnx }}") -ne $hasSlnx) { throw "Unexpected .slnx file presence: $hasSlnx" }
          if ([bool]::Parse("${{ matrix.expectTests }}") -ne $hasTests) { throw "Unexpected test project presence: $hasTests" }
          if ($hasTests) {
            dotnet test "$projectName.Tests/$projectName.Tests.csproj" /p:TreatWarningsAsErrors=true
          } else {
            dotnet build "$projectName/$projectName.csproj" /p:TreatWarningsAsErrors=true
          }
          dotnet pack "$projectName/$projectName.csproj" --configuration Release -o ./NuGet

  test-quickstart-benchmarkconsole:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            args: ""
            expectSln: false
            expectSlnx: true
            expectTests: true
          - variant: no-tests
            args: "--no-tests"
            expectSln: false
            expectSlnx: true
            expectTests: false
          - variant: sln
            args: "--sln"
            expectSln: true
            expectSlnx: false
            expectTests: true
          - variant: no-sln
            args: "--no-sln"
            expectSln: false
            expectSlnx: false
            expectTests: true

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          $outDir = "TestQuickstartBenchmarkConsole-${{ matrix.variant }}"
          mkdir $outDir
          Push-Location $outDir
          dotnet new bmichaelis.quickstart.benchmarkconsole ${{ matrix.args }}
          $projectName = Split-Path -Leaf (Get-Location)
          $hasSln = Test-Path "$projectName.sln"
          $hasSlnx = Test-Path "$projectName.slnx"
          $hasTests = Test-Path "$projectName.Tests/$projectName.Tests.csproj"
          if ([bool]::Parse("${{ matrix.expectSln }}") -ne $hasSln) { throw "Unexpected .sln file presence: $hasSln" }
          if ([bool]::Parse("${{ matrix.expectSlnx }}") -ne $hasSlnx) { throw "Unexpected .slnx file presence: $hasSlnx" }
          if ([bool]::Parse("${{ matrix.expectTests }}") -ne $hasTests) { throw "Unexpected test project presence: $hasTests" }
          if ($hasTests) {
            dotnet test "$projectName.Tests/$projectName.Tests.csproj" /p:TreatWarningsAsErrors=true
          } else {
            dotnet build "$projectName/$projectName.csproj" /p:TreatWarningsAsErrors=true
          }
          dotnet run --project "$projectName/$projectName.csproj" -c Release
          dotnet pack "$projectName/$projectName.csproj" --configuration Release -o ./NuGet

  test-quickstart-consoleapp:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false
      matrix:
        include:
          - variant: default
            args: ""
            expectSln: false
            expectSlnx: true
            expectTests: true
          - variant: no-tests
            args: "--no-tests"
            expectSln: false
            expectSlnx: true
            expectTests: false
          - variant: no-sln
            args: "--no-sln"
            expectSln: false
            expectSlnx: false
            expectTests: true

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          $outDir = "TestQuickstartConsoleApp-${{ matrix.variant }}"
          mkdir $outDir
          Push-Location $outDir
          dotnet new bmichaelis.quickstart.consoleapp ${{ matrix.args }}
          $projectName = Split-Path -Leaf (Get-Location)
          $hasSln = Test-Path "$projectName.sln"
          $hasSlnx = Test-Path "$projectName.slnx"
          $hasTests = Test-Path "$projectName.Tests/$projectName.Tests.csproj"
          if ([bool]::Parse("${{ matrix.expectSln }}") -ne $hasSln) { throw "Unexpected .sln file presence: $hasSln" }
          if ([bool]::Parse("${{ matrix.expectSlnx }}") -ne $hasSlnx) { throw "Unexpected .slnx file presence: $hasSlnx" }
          if ([bool]::Parse("${{ matrix.expectTests }}") -ne $hasTests) { throw "Unexpected test project presence: $hasTests" }
          if ($hasTests) {
            dotnet test "$projectName.Tests/$projectName.Tests.csproj" /p:TreatWarningsAsErrors=true
          } else {
            dotnet build "$projectName/$projectName.csproj" /p:TreatWarningsAsErrors=true
          }
          dotnet pack "$projectName/$projectName.csproj" --configuration Release -o ./NuGet

  test-aspire-minimalapi:
    runs-on: ubuntu-latest
    needs: build
    strategy:
      fail-fast: false   # run all variants even if one fails — want the full picture
      matrix:
        include:
          - variant: default
            args: ""
          - variant: applicationInsights
            args: "--applicationInsights true"

    steps:
      - name: Download NuGet Artifacts
        uses: actions/download-artifact@v8
        with:
          name: NuGet

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: 10.x

      - name: Test Template (${{ matrix.variant }})
        run: |
          dotnet new install $(Get-ChildItem -Path "BenjaminMichaelis.Dotnet.Templates.*.nupkg").Name
          $outDir = "TestAspireMinimalApi-${{ matrix.variant }}"
          mkdir $outDir
          Push-Location $outDir
          dotnet new bmichaelis.aspire.minimalapi --name MinimalApi ${{ matrix.args }}
          Push-Location MinimalApi
          dotnet build /p:TreatWarningsAsErrors=true
          dotnet test --no-build /p:TreatWarningsAsErrors=true -p:TestingPlatformDotnetTestSupport=true

  all-tests:
    runs-on: ubuntu-latest
    needs: [test-library, test-quickstart-benchmarkconsole, test-quickstart-consoleapp, test-aspire-minimalapi]
    if: always()
    steps:
      - name: All tests passed
        run: |
          if ("${{ contains(needs.*.result, 'failure') }}" -eq "true" -or "${{ contains(needs.*.result, 'cancelled') }}" -eq "true") {
            throw "One or more test jobs failed or were cancelled"
          }
