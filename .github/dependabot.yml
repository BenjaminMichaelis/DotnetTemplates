version: 2
updates:
# Template Project (Root)
  - package-ecosystem: "github-actions" 
    directory: "/"
    schedule:
      interval: "weekly" 
    groups:
       dev-dependencies:
          patterns:
            - "*-artifact"


# Library.NuGet Template
  - package-ecosystem: "nuget" 
    directory: "/templates/Library/NuGet"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions" 
    directory: "/templates/Library/NuGet/.github/workflows"
    schedule:
      interval: "weekly" 
    groups:
       dev-dependencies:
          patterns:
            - "*-artifact"  

# Quickstart.BenchmarkApp Project
  - package-ecosystem: "nuget"
    directory: "/templates/Quickstart/BenchmarkApp"
    schedule:
      interval: "weekly" 

# Quickstart.ConsoleApp Project
  - package-ecosystem: "nuget"
    directory: "/templates/Quickstart/ConsoleApp"
    schedule:
      interval: "weekly"

# Aspire.MinimalApi Template
  - package-ecosystem: "nuget"
    directory: "/templates/Aspire/MinimalApi"
    schedule:
      interval: "weekly"

  # NOTE: Docker image and global.json SDK updates are kept in sync by the
  # update-dotnet-sdk.yml workflow in the template, not by Dependabot.
  # A separate Dependabot docker PR would update the Dockerfile without
  # touching global.json, breaking the build on major.minor version jumps.

