version: 2

multi-ecosystem-groups:
  dotnet-version:
    schedule:
      interval: "weekly"
    labels: ["dependencies"]

updates:
# Template Project (Root)
  - package-ecosystem: "github-actions" 
    directory: "/.github/workflows"
    schedule:
      interval: "weekly" 
    groups:
       dev-dependencies:
          patterns:
            - "*-artifact"


# Library.NuGet Template
  - package-ecosystem: "nuget" 
    directory: "/templates/Library/NuGet"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions" 
    directory: "/templates/Library/NuGet/.github/workflows"
    schedule:
      interval: "weekly" 
    groups:
       dev-dependencies:
          patterns:
            - "*-artifact"

# Quickstart.BenchmarkApp Project
  - package-ecosystem: "nuget"
    directory: "/templates/Quickstart/BenchmarkApp"
    schedule:
      interval: "weekly" 

  - package-ecosystem: "dotnet-sdk"
    directory: "/templates/Quickstart/BenchmarkApp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/templates/Quickstart/BenchmarkApp/.github/workflows"
    schedule:
      interval: "weekly"

# Quickstart.ConsoleApp Project
  - package-ecosystem: "nuget"
    directory: "/templates/Quickstart/ConsoleApp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "dotnet-sdk"
    directory: "/templates/Quickstart/ConsoleApp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/templates/Quickstart/ConsoleApp/.github/workflows"
    schedule:
      interval: "weekly"

  - package-ecosystem: "dotnet-sdk"
    directory: "/templates/Library/NuGet"
    schedule:
      interval: "weekly"

# Aspire.MinimalApi Template - NuGet, Docker, and SDK grouped into one PR
  - package-ecosystem: "nuget"
    directory: "/templates/Aspire/MinimalApi"
    schedule:
      interval: "weekly"
    patterns: ["*"]
    groups:
      entity-framework-stack:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "dotnet-ef"
    multi-ecosystem-group: "dotnet-version"

  - package-ecosystem: "docker"
    directory: "/templates/Aspire/MinimalApi/MinimalApi"
    schedule:
      interval: "weekly"
    patterns: ["*"]
    multi-ecosystem-group: "dotnet-version"

  - package-ecosystem: "dotnet-sdk"
    directory: "/templates/Aspire/MinimalApi"
    schedule:
      interval: "weekly"
    patterns: ["*"]
    multi-ecosystem-group: "dotnet-version"

  - package-ecosystem: "terraform"
    directory: "/templates/Aspire/MinimalApi/Infra"
    schedule:
      interval: "weekly"

  - package-ecosystem: "github-actions"
    directory: "/templates/Aspire/MinimalApi/.github/workflows"
    schedule:
      interval: "weekly"

