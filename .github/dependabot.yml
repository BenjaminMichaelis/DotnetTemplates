version: 2

multi-ecosystem-groups:
  dotnet-version:
    schedule:
      interval: "weekly"
    labels: ["dependencies"]

updates:
# Template Project (Root)
  - package-ecosystem: "github-actions" 
    directories:
      - "/"
      - "/templates/Library/NuGet/.github/workflows"
      - "/templates/Quickstart/BenchmarkApp/.github/workflows"
      - "/templates/Quickstart/ConsoleApp/.github/workflows"
      - "/templates/Aspire/MinimalApi/.github/workflows"
    schedule:
      interval: "weekly" 
    groups:
       dev-dependencies:
          patterns:
            - "*-artifact"


# Library.NuGet, Quickstart.BenchmarkApp, Quickstart.ConsoleApp Templates
  - package-ecosystem: "nuget"
    directories:
      - "/templates/Library/NuGet"
      - "/templates/Quickstart/BenchmarkApp"
      - "/templates/Quickstart/ConsoleApp"
    schedule:
      interval: "weekly"

  - package-ecosystem: "dotnet-sdk"
    directories:
      - "/templates/Library/NuGet"
      - "/templates/Quickstart/BenchmarkApp"
      - "/templates/Quickstart/ConsoleApp"
    schedule:
      interval: "weekly"

# Aspire.MinimalApi Template - NuGet, Docker, and SDK grouped into one PR
  - package-ecosystem: "nuget"
    directory: "/templates/Aspire/MinimalApi"
    schedule:
      interval: "weekly"
    groups:
      entity-framework-stack:
        patterns:
          - "Microsoft.EntityFrameworkCore.*"
          - "dotnet-ef"

  - package-ecosystem: "docker"
    directory: "/templates/Aspire/MinimalApi/MinimalApi"
    schedule:
      interval: "weekly"
    patterns: ["*"]
    multi-ecosystem-group: "dotnet-version"

  - package-ecosystem: "dotnet-sdk"
    directory: "/templates/Aspire/MinimalApi"
    schedule:
      interval: "weekly"
    patterns: ["*"]
    multi-ecosystem-group: "dotnet-version"

  - package-ecosystem: "terraform"
    directory: "/templates/Aspire/MinimalApi/Infra"
    schedule:
      interval: "weekly"

